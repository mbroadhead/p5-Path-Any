name             = Path-Any
author           = Your Name <PAUSEID@cpan.org>
license          = Perl_5
copyright_holder = Your Name
copyright_year   = 2025
version          = 0.001

[@Basic]

; Also generate META.json (in addition to META.yml from @Basic)
[MetaJSON]

; Auto-detect which packages this dist provides
[MetaProvides::Package]

; Declare runtime dependencies
[Prereqs / RuntimeRequires]
perl       = 5.010
Path::Tiny = 0.140

; Optional adapters — install these to use the relevant adapter
[Prereqs / RuntimeRecommends]
Net::SFTP::Foreign = 1.90
Paws               = 0

; Test dependencies
[Prereqs / TestRequires]
Test::More = 1.001002

; Link dist metadata to its repository
[MetaResources]
repository.type = git
repository.url  = https://github.com/mbroadhead/p5-Path-Any.git
repository.web  = https://github.com/mbroadhead/p5-Path-Any
bugtracker.web  = https://github.com/mbroadhead/p5-Path-Any/issues
